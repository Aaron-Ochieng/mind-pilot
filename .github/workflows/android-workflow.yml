name: Android CI/CD

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Expo CLI
        run: bun install -g expo-cli

      - name: Prebuild Expo project
        run: bunx expo prebuild --clean

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Decode release keystore
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > android/app/release.keystore

          # Append Gradle properties one line at a time
          echo "MYAPP_UPLOAD_STORE_FILE=release.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=$KEY_ALIAS" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Validate keystore + Gradle config
        run: |
          set -e

          echo "Checking keystore file..."
          if [ ! -f android/app/release.keystore ]; then
            echo "❌ Keystore file NOT found!"
            exit 1
          fi

          echo "Keystore exists"

          echo "Checking keystore validity..."
          keytool -list -keystore android/app/release.keystore -storepass "$KEYSTORE_PASSWORD" > /dev/null 2>&1 || {
            echo "❌ Invalid keystore or wrong password"
            exit 1
          }

          echo "✅ Keystore is valid"

          echo "🔍 Checking gradle.properties..."
          if [ ! -f android/gradle.properties ]; then
            echo "❌ gradle.properties missing!"
            exit 1
          fi

          echo "📄 gradle.properties content (safe preview):"
          cat android/gradle.properties | sed 's/=.*/=*** (hidden)/'

          echo "🔍 Checking required Gradle properties..."

          grep -q "MYAPP_UPLOAD_STORE_FILE" android/gradle.properties || { echo "❌ STORE_FILE missing"; exit 1; }
          grep -q "MYAPP_UPLOAD_KEY_ALIAS" android/gradle.properties || { echo "❌ KEY_ALIAS missing"; exit 1; }
          grep -q "MYAPP_UPLOAD_STORE_PASSWORD" android/gradle.properties || { echo "❌ STORE_PASSWORD missing"; exit 1; }
          grep -q "MYAPP_UPLOAD_KEY_PASSWORD" android/gradle.properties || { echo "❌ KEY_PASSWORD missing"; exit 1; }

          echo "✅ Gradle properties look good"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Build signed APKs
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APKs with app name and tag
        run: |
          APP_NAME="BlockPilot"
          TAG=${GITHUB_REF_NAME:-${GITHUB_SHA::7}}
          APK_DIR=android/app/build/outputs/apk/release

          for apk in $APK_DIR/*.apk; do
            if [[ -f "$apk" ]]; then
              ABI=$(basename "$apk" | sed -E 's/app-([a-z0-9\-]+)-release\.apk/\1/')
              NEW_NAME="${APP_NAME}-${ABI}-${TAG}.apk"
              mv "$apk" "$APK_DIR/$NEW_NAME"
              echo "Renamed $apk -> $NEW_NAME"
            fi
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
